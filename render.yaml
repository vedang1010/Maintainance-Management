# Render Blueprint Configuration
# https://render.com/docs/blueprint-spec

services:
  # Backend API Service (Docker)
  - type: web
    name: ambica-apartment-api
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    region: singapore  # or oregon, frankfurt based on your preference
    plan: free  # or starter, standard based on needs
    branch: main
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: MONGODB_URI
        sync: false  # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        value: "Ambica Apartment"
      - key: IMAGEKIT_PUBLIC_KEY
        sync: false
      - key: IMAGEKIT_PRIVATE_KEY
        sync: false
      - key: IMAGEKIT_URL_ENDPOINT
        sync: false
      - key: CLIENT_URL
        sync: false  # Set to your Vercel frontend URL
      - key: OTP_EXPIRY_MINUTES
        value: "10"
